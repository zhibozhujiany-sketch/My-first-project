<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iPad 觸控乒乓球 - 音樂版</title>
    <style>
        body { background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; touch-action: none; }
        canvas { border: 2px solid #fff; background: #000; max-width: 90vw; max-height: 70vh; }
        #score { color: white; margin-bottom: 10px; font-family: Arial; font-size: 24px; }
        #musicBtn { 
            position: absolute; bottom: 20px; padding: 10px 20px; 
            background: #28a745; color: white; border: none; border-radius: 5px; font-size: 16px;
        }
    </style>
</head>
<body>
    <div id="score">分數: 0</div>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    <button id="musicBtn">點擊啟動音樂</button>

    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const bgMusic = document.getElementById("bgMusic");
    const musicBtn = document.getElementById("musicBtn");

    let paddleHeight = 80, paddleWidth = 10;
    let leftPaddleY = (canvas.height - paddleHeight) / 2;
    let rightPaddleY = (canvas.height - paddleHeight) / 2;
    let ballX = canvas.width / 2, ballY = canvas.height / 2;
    let ballDX = 5, ballDY = 5;
    let score = 0;

    // 啟動音樂
    musicBtn.addEventListener("click", function() {
        bgMusic.play();
        musicBtn.style.display = "none"; // 點了之後按鈕消失
    });

    // 觸控控制
    canvas.addEventListener("touchmove", function(e) {
        e.preventDefault();
        let touch = e.touches[0];
        let rect = canvas.getBoundingClientRect();
        let scaleY = canvas.height / rect.height;
        leftPaddleY = (touch.clientY - rect.top) * scaleY - paddleHeight / 2;
    }, { passive: false });

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#FFF";
        ctx.fillRect(10, leftPaddleY, paddleWidth, paddleHeight);
        ctx.fillRect(canvas.width - 20, rightPaddleY, paddleWidth, paddleHeight);
        ctx.beginPath();
        ctx.arc(ballX, ballY, 8, 0, Math.PI*2);
        ctx.fill();

        // 電腦 AI
        rightPaddleY += (ballY - (rightPaddleY + paddleHeight/2)) * 0.1;

        ballX += ballDX; ballY += ballDY;
        if (ballY < 0 || ballY > canvas.height) ballDY = -ballDY;

        if (ballX < 30 && ballY > leftPaddleY && ballY < leftPaddleY + paddleHeight) {
            ballDX = -ballDX;
            score++;
            scoreEl.innerText = "分數: " + score;
        }
        if (ballX > canvas.width - 30 && ballY > rightPaddleY && ballY < rightPaddleY + paddleHeight) {
            ballDX = -ballDX;
        }

        if (ballX < 0 || ballX > canvas.width) {
            ballX = canvas.width/2; 
            ballDX *= -1;
            score = 0;
            scoreEl.innerText = "分數: 0";
        }
        requestAnimationFrame(draw);
    }
    draw();
</script>
</body>
</html>
