<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Pong Game</title>\n    <style>\n        body {\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            height: 100vh;\n            background: black;\n            color: white;\n            margin: 0;\n        }\n        canvas {\n            background: black;\n            border: 1px solid white;\n        }\n    </style>\n</head>\n<body>\n    <canvas id="pong" width="800" height="400"></canvas>\n    <script>\n        const canvas = document.getElementById('pong');\n        const context = canvas.getContext('2d');\n\n        // Create the pong paddle and ball\n        const paddleWidth = 10;\n        const paddleHeight = 100;\n        const ballSize = 10;\n\n        let leftPaddleY = canvas.height / 2 - paddleHeight / 2;\n        let rightPaddleY = canvas.height / 2 - paddleHeight / 2;\n        let ballX = canvas.width / 2;\n        let ballY = canvas.height / 2;\n        let ballSpeedX = 5;\n        let ballSpeedY = 5;\n        let leftScore = 0;\n        let rightScore = 0;\n\n        // Control paddles with mouse and keyboard\n        canvas.addEventListener('mousemove', (event) => {\n            leftPaddleY = event.clientY - canvas.getBoundingClientRect().top - paddleHeight / 2;\n        });\n\n        document.addEventListener('keydown', (event) => {\n            if (event.key === 'ArrowUp' && leftPaddleY > 0) {\n                leftPaddleY -= 20;\n            } else if (event.key === 'ArrowDown' && leftPaddleY + paddleHeight < canvas.height) {\n                leftPaddleY += 20;\n            }\n        });\n\n        function draw() {\n            context.clearRect(0, 0, canvas.width, canvas.height);\n            context.fillStyle = 'white';\n            context.fillRect(0, leftPaddleY, paddleWidth, paddleHeight);\n            context.fillRect(canvas.width - paddleWidth, rightPaddleY, paddleWidth, paddleHeight);\n            context.beginPath();\n            context.arc(ballX, ballY, ballSize, 0, Math.PI * 2);\n            context.fill();\n        }\n\n        function update() {\n            ballX += ballSpeedX;\n            ballY += ballSpeedY;\n\n            if (ballY + ballSize > canvas.height || ballY - ballSize < 0) {\n                ballSpeedY = -ballSpeedY;\n            }\n\n            if (ballX < paddleWidth && ballY > leftPaddleY && ballY < leftPaddleY + paddleHeight) {\n                ballSpeedX = -ballSpeedX;\n            } else if (ballX > canvas.width - paddleWidth && ballY > rightPaddleY && ballY < rightPaddleY + paddleHeight) {\n                ballSpeedX = -ballSpeedX;\n            }\n\n            if (ballX < 0) {\n                rightScore++;\n                resetBall();\n            } else if (ballX > canvas.width) {\n                leftScore++;\n                resetBall();\n            }\n\n            // Simple AI for right paddle\n            if (rightPaddleY + paddleHeight / 2 < ballY) {\n                rightPaddleY += 4;\n            } else {\n                rightPaddleY -= 4;\n            }\n\n            // Draw Score\n            context.font = '20px Arial';\n            context.fillText(leftScore, canvas.width / 4, 20);\n            context.fillText(rightScore, canvas.width * 3 / 4, 20);\n        }\n\n        function resetBall() {\n            ballX = canvas.width / 2;\n            ballY = canvas.height / 2;\n            ballSpeedX = -ballSpeedX;\n        }\n\n        function gameLoop() {\n            draw();\n            update();\n            requestAnimationFrame(gameLoop);\n        }\n\n        gameLoop();\n    <\/script>\n</body>\n</html>
